name: MarketForge AI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install ruff mypy pydantic pydantic-settings
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     marketforge
          POSTGRES_PASSWORD: marketforge
          POSTGRES_DB:       marketforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL_SYNC: sqlite:///./test.db
      DATABASE_URL:      sqlite+aiosqlite:///./test.db
      REDIS_URL:         redis://localhost:6379/15
      GEMINI_API_KEY:    ""
      ADZUNA_APP_ID:     ""
      ADZUNA_APP_KEY:    ""
      REED_API_KEY:      ""
      TAVILY_API_KEY:    ""
      ENVIRONMENT:       development
      LOG_LEVEL:         WARNING
      LOG_FORMAT:        console
      LANGCHAIN_TRACING_V2: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm || true
      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_connectors
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --requirement <(pip install -e . --dry-run 2>&1 | grep "^  " | awk '{print $1}') || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t marketforge-ai:test .
